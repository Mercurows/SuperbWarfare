side = "BOTH"

[[dependencies.superbwarfare]]
modId = "curios"
type = "required"
versionRange = "[5.4.0,)"
ordering = "NONE"
side = "BOTH"

[[dependencies.superbwarfare]]
modId = "geckolib"
type = "required"
versionRange = "[4.4.6,)"
ordering = "NONE"
side = "BOTH"

[[dependencies.superbwarfare]]
